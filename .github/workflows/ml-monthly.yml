name: ML Monthly Evaluation

# Runs 1st of each month at 9am ET (14:00 UTC).
# Evaluates model accuracy over the past month and generates performance reports.
on:
  schedule:
    - cron: '0 14 1 * *'
  workflow_dispatch: {}

concurrency:
  group: ml-monthly
  cancel-in-progress: false

jobs:
  monthly-evaluation:
    name: Evaluate Model Performance
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ml-deps-${{ hashFiles('ml/requirements.txt') }}
          restore-keys: ml-deps-

      - name: Install dependencies
        run: pip install -r ml/requirements.txt

      - name: Run monthly evaluation
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: python -m ml.pipeline.monthly_eval

      - name: Ping healthcheck
        if: success()
        run: curl -fsS --retry 3 https://hc-ping.com/${{ secrets.HC_PING_UUID_MONTHLY }} || true

      - name: Post failure notification
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # Skip cleanly when no webhook is configured (avoids "curl: no URL specified").
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL not set — skipping notification."
            exit 0
          fi
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\":\"**ML Monthly Evaluation Failed**\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$DISCORD_WEBHOOK_URL" || true
