# PuckIQ ML Feature Registry — V2
#
# Each feature defines how it is computed:
#   lookup        — single value from a Supabase table (standings, goalie stats)
#   rolling_team  — rolling window over recent games
#   rolling_goalie — rolling window over recent goalie starts
#   jsonb_lookup  — extract value from JSONB column in team_stat_categories
#   derived       — computed from other features (no direct DB query)
#
# CRITICAL: All features use as_of_date to prevent data leakage.
# Standings use the snapshot from the day BEFORE the game.
#
# TO ADD A NEW FEATURE:
#   1. Define it below in the `features:` section
#   2. Add it to the relevant model(s) in `model_features:`
#   3. If it's a new compute type, implement it in compute.py
#   That's it — tests, baselines, and dashboard auto-discover from this file.

features:
  # ---------------------------------------------------------------
  # Standings-based (lookup)
  # ---------------------------------------------------------------
  home_point_pctg:
    description: "Home team season point percentage"
    compute: lookup
    lookup:
      table: standings
      column: point_pctg
      team_key: home_team
      date_mode: latest_before
    tier: 1
    enabled: true

  away_point_pctg:
    description: "Away team season point percentage"
    compute: lookup
    lookup:
      table: standings
      column: point_pctg
      team_key: away_team
      date_mode: latest_before
    tier: 1
    enabled: true

  home_home_win_pct:
    description: "Home team win percentage at home this season"
    compute: lookup
    lookup:
      table: standings
      column: home_win_pct
      team_key: home_team
      date_mode: latest_before
    tier: 2
    enabled: true

  away_road_win_pct:
    description: "Away team win percentage on the road this season"
    compute: lookup
    lookup:
      table: standings
      column: road_win_pct
      team_key: away_team
      date_mode: latest_before
    tier: 2
    enabled: true

  # ---------------------------------------------------------------
  # Rolling window (recent form)
  # ---------------------------------------------------------------
  home_goals_for_l10:
    description: "Home team avg goals scored in last 10 games"
    compute: rolling_team
    rolling:
      stat: goals_for
      team_key: home_team
      window: 10
      aggregation: mean
    tier: 1
    enabled: true

  away_goals_for_l10:
    description: "Away team avg goals scored in last 10 games"
    compute: rolling_team
    rolling:
      stat: goals_for
      team_key: away_team
      window: 10
      aggregation: mean
    tier: 1
    enabled: true

  home_goals_against_l10:
    description: "Home team avg goals allowed in last 10 games"
    compute: rolling_team
    rolling:
      stat: goals_against
      team_key: home_team
      window: 10
      aggregation: mean
    tier: 1
    enabled: true

  away_goals_against_l10:
    description: "Away team avg goals allowed in last 10 games"
    compute: rolling_team
    rolling:
      stat: goals_against
      team_key: away_team
      window: 10
      aggregation: mean
    tier: 1
    enabled: true

  home_win_pct_l10:
    description: "Home team win rate in last 10 games"
    compute: rolling_team
    rolling:
      stat: win
      team_key: home_team
      window: 10
      aggregation: mean
    tier: 1
    enabled: true

  away_win_pct_l10:
    description: "Away team win rate in last 10 games"
    compute: rolling_team
    rolling:
      stat: win
      team_key: away_team
      window: 10
      aggregation: mean
    tier: 1
    enabled: true

  home_sog_l10:
    description: "Home team avg shots on goal in last 10 games"
    compute: rolling_team
    rolling:
      stat: sog
      team_key: home_team
      window: 10
      aggregation: mean
    tier: 2
    enabled: true

  away_sog_l10:
    description: "Away team avg shots on goal in last 10 games"
    compute: rolling_team
    rolling:
      stat: sog
      team_key: away_team
      window: 10
      aggregation: mean
    tier: 2
    enabled: true

  # ---------------------------------------------------------------
  # Goalie (lookup from goalie_season_stats)
  # ---------------------------------------------------------------
  home_starter_save_pctg:
    description: "Home starting goalie save percentage"
    compute: lookup
    lookup:
      table: goalie_season_stats
      column: save_pctg
      team_key: home_team
      select: starter
    tier: 1
    enabled: true

  away_starter_save_pctg:
    description: "Away starting goalie save percentage"
    compute: lookup
    lookup:
      table: goalie_season_stats
      column: save_pctg
      team_key: away_team
      select: starter
    tier: 1
    enabled: true

  # ---------------------------------------------------------------
  # Rolling goalie (recent form)
  # ---------------------------------------------------------------
  home_starter_save_pctg_l10:
    description: "Home starting goalie save% in last 10 starts (rolling form)"
    compute: rolling_goalie
    rolling:
      stat: save_pctg
      team_key: home_team
      window: 10
    tier: 1
    enabled: true

  away_starter_save_pctg_l10:
    description: "Away starting goalie save% in last 10 starts (rolling form)"
    compute: rolling_goalie
    rolling:
      stat: save_pctg
      team_key: away_team
      window: 10
    tier: 1
    enabled: true

  # ---------------------------------------------------------------
  # Possession (rolling_team_advanced from skater_game_categories)
  # ---------------------------------------------------------------
  home_corsi_pct_l10:
    description: "Home team avg Corsi For% over last 10 games (puck possession)"
    compute: rolling_team_advanced
    rolling:
      stat: corsi_pct
      team_key: home_team
      window: 10
    tier: 2
    enabled: true

  away_corsi_pct_l10:
    description: "Away team avg Corsi For% over last 10 games (puck possession)"
    compute: rolling_team_advanced
    rolling:
      stat: corsi_pct
      team_key: away_team
      window: 10
    tier: 2
    enabled: true

  home_fenwick_pct_l10:
    description: "Home team avg Fenwick For% over last 10 games (unblocked shot attempts)"
    compute: rolling_team_advanced
    rolling:
      stat: fenwick_pct
      team_key: home_team
      window: 10
    tier: 2
    enabled: true

  away_fenwick_pct_l10:
    description: "Away team avg Fenwick For% over last 10 games (unblocked shot attempts)"
    compute: rolling_team_advanced
    rolling:
      stat: fenwick_pct
      team_key: away_team
      window: 10
    tier: 2
    enabled: true

  # ---------------------------------------------------------------
  # Expected Goals (rolling_xg from game_play_by_play shot data)
  # ---------------------------------------------------------------
  home_xgf_l10:
    description: "Home team avg expected goals for over last 10 games (shot quality)"
    compute: rolling_xg
    rolling:
      stat: xgf
      team_key: home_team
      window: 10
    tier: 2
    enabled: true

  away_xgf_l10:
    description: "Away team avg expected goals for over last 10 games (shot quality)"
    compute: rolling_xg
    rolling:
      stat: xgf
      team_key: away_team
      window: 10
    tier: 2
    enabled: true

  home_xga_l10:
    description: "Home team avg expected goals against over last 10 games"
    compute: rolling_xg
    rolling:
      stat: xga
      team_key: home_team
      window: 10
    tier: 2
    enabled: true

  away_xga_l10:
    description: "Away team avg expected goals against over last 10 games"
    compute: rolling_xg
    rolling:
      stat: xga
      team_key: away_team
      window: 10
    tier: 2
    enabled: true

  # ---------------------------------------------------------------
  # Special teams (jsonb_lookup from team_stat_categories)
  # ---------------------------------------------------------------
  home_pp_pct:
    description: "Home team power play percentage"
    compute: jsonb_lookup
    jsonb:
      table: team_stat_categories
      category: powerplay
      field: powerPlayPct
      team_key: home_team
    tier: 1
    enabled: true

  away_pp_pct:
    description: "Away team power play percentage"
    compute: jsonb_lookup
    jsonb:
      table: team_stat_categories
      category: powerplay
      field: powerPlayPct
      team_key: away_team
    tier: 1
    enabled: true

  home_pk_pct:
    description: "Home team penalty kill percentage"
    compute: jsonb_lookup
    jsonb:
      table: team_stat_categories
      category: penaltykill
      field: penaltyKillPct
      team_key: home_team
    tier: 1
    enabled: true

  away_pk_pct:
    description: "Away team penalty kill percentage"
    compute: jsonb_lookup
    jsonb:
      table: team_stat_categories
      category: penaltykill
      field: penaltyKillPct
      team_key: away_team
    tier: 1
    enabled: true

  # ---------------------------------------------------------------
  # Rest / schedule (derived from games table)
  # ---------------------------------------------------------------
  rest_advantage:
    description: "Home team rest days minus away team rest days (positive = home more rested)"
    compute: derived
    derived:
      formula: home_rest_days - away_rest_days
      inputs:
        - home_rest_days
        - away_rest_days
    tier: 1
    enabled: true

  home_is_back_to_back:
    description: "1 if home team played yesterday (rest = 1 day), 0 otherwise"
    compute: derived
    derived:
      formula: 1 if home_rest_days == 1 else 0
      inputs:
        - home_rest_days
    tier: 2
    enabled: true

  away_is_back_to_back:
    description: "1 if away team played yesterday (rest = 1 day), 0 otherwise"
    compute: derived
    derived:
      formula: 1 if away_rest_days == 1 else 0
      inputs:
        - away_rest_days
    tier: 2
    enabled: true

  home_games_last_7d:
    description: "Home team games played in last 7 days (schedule density)"
    compute: derived
    derived:
      formula: count of recent games within 7 days
      inputs: []
    tier: 2
    enabled: true

  away_games_last_7d:
    description: "Away team games played in last 7 days (schedule density)"
    compute: derived
    derived:
      formula: count of recent games within 7 days
      inputs: []
    tier: 2
    enabled: true

  # ---------------------------------------------------------------
  # Head-to-head record (game_detail_lookup from game_details)
  # ---------------------------------------------------------------
  h2h_home_win_pct:
    description: "Home team win rate vs this opponent this season (H2H)"
    compute: game_detail_lookup
    game_detail:
      field: home_win_pct
    tier: 2
    enabled: true

  h2h_goals_diff:
    description: "Home team goal differential vs this opponent this season"
    compute: game_detail_lookup
    game_detail:
      field: goals_diff
    tier: 2
    enabled: true

  # ---------------------------------------------------------------
  # Goalie depth (starter GAA + backup save%)
  # ---------------------------------------------------------------
  home_starter_gaa:
    description: "Home starting goalie goals against average"
    compute: lookup
    lookup:
      table: goalie_season_stats
      column: goals_against_avg
      team_key: home_team
      select: starter
    tier: 2
    enabled: true

  away_starter_gaa:
    description: "Away starting goalie goals against average"
    compute: lookup
    lookup:
      table: goalie_season_stats
      column: goals_against_avg
      team_key: away_team
      select: starter
    tier: 2
    enabled: true

  home_backup_save_pctg:
    description: "Home backup goalie save percentage"
    compute: lookup
    lookup:
      table: goalie_season_stats
      column: save_pctg
      team_key: home_team
      select: backup
    tier: 2
    enabled: true

  away_backup_save_pctg:
    description: "Away backup goalie save percentage"
    compute: lookup
    lookup:
      table: goalie_season_stats
      column: save_pctg
      team_key: away_team
      select: backup
    tier: 2
    enabled: true

  # ---------------------------------------------------------------
  # Player props (player_lookup from skater stats)
  # ---------------------------------------------------------------
  player_gpg:
    description: "Player goals per game (season avg)"
    compute: player_lookup
    player_lookup:
      table: skater_season_stats
      column: goals_per_game
    tier: 1
    enabled: true

  player_toi:
    description: "Player avg time on ice per game"
    compute: player_lookup
    player_lookup:
      table: skater_season_stats
      column: avg_toi_per_game
    tier: 1
    enabled: true

  player_shot_pct:
    description: "Player shooting percentage"
    compute: player_lookup
    player_lookup:
      table: skater_season_stats
      column: shooting_pctg
    tier: 1
    enabled: true

  opponent_ga_per_game:
    description: "Opponent goals against per game"
    compute: derived
    derived:
      formula: opponent goals against / opponent games played
      inputs: []
    tier: 1
    enabled: true

  is_home:
    description: "1 if player's team is home, 0 if away"
    compute: derived
    derived:
      formula: 1 if player team == home team else 0
      inputs: []
    tier: 1
    enabled: true

  # ---------------------------------------------------------------
  # Cross-model (computed in pipeline, not in compute.py)
  # ---------------------------------------------------------------
  gw_home_win_prob:
    description: "Game winner model P(home_win) — cross-model signal for spread/totals"
    compute: cross_model
    cross_model:
      source_model: game_winner
    tier: 1
    enabled: true


# ---------------------------------------------------------------
# Model -> feature mapping
# ---------------------------------------------------------------
model_features:
  game_winner:
    - home_point_pctg
    - away_point_pctg
    - home_home_win_pct
    - away_road_win_pct
    - home_goals_for_l10
    - away_goals_for_l10
    - home_goals_against_l10
    - away_goals_against_l10
    - home_win_pct_l10
    - away_win_pct_l10
    - home_sog_l10
    - away_sog_l10
    - home_starter_save_pctg
    - away_starter_save_pctg
    - home_starter_save_pctg_l10
    - away_starter_save_pctg_l10
    - home_pp_pct
    - away_pp_pct
    - home_pk_pct
    - away_pk_pct
    - rest_advantage
    - home_is_back_to_back
    - away_is_back_to_back
    - home_corsi_pct_l10
    - away_corsi_pct_l10
    - home_fenwick_pct_l10
    - away_fenwick_pct_l10
    - home_xgf_l10
    - away_xgf_l10
    - home_xga_l10
    - away_xga_l10
    - home_games_last_7d
    - away_games_last_7d
    - h2h_home_win_pct
    - h2h_goals_diff
    - home_starter_gaa
    - away_starter_gaa

  spread:
    - home_point_pctg
    - away_point_pctg
    - home_goals_for_l10
    - away_goals_for_l10
    - home_goals_against_l10
    - away_goals_against_l10
    - home_sog_l10
    - away_sog_l10
    - home_starter_save_pctg
    - away_starter_save_pctg
    - home_starter_save_pctg_l10
    - away_starter_save_pctg_l10
    - home_pp_pct
    - away_pp_pct
    - home_pk_pct
    - away_pk_pct
    - rest_advantage
    - home_corsi_pct_l10
    - away_corsi_pct_l10
    - home_fenwick_pct_l10
    - away_fenwick_pct_l10
    - home_xgf_l10
    - away_xgf_l10
    - home_xga_l10
    - away_xga_l10
    - home_games_last_7d
    - away_games_last_7d
    - h2h_home_win_pct
    - h2h_goals_diff
    - home_starter_gaa
    - away_starter_gaa
    - gw_home_win_prob

  totals:
    - home_goals_for_l10
    - away_goals_for_l10
    - home_goals_against_l10
    - away_goals_against_l10
    - home_sog_l10
    - away_sog_l10
    - home_starter_save_pctg
    - away_starter_save_pctg
    - home_starter_save_pctg_l10
    - away_starter_save_pctg_l10
    - home_pp_pct
    - away_pp_pct
    - home_pk_pct
    - away_pk_pct
    - home_corsi_pct_l10
    - away_corsi_pct_l10
    - home_fenwick_pct_l10
    - away_fenwick_pct_l10
    - home_xgf_l10
    - away_xgf_l10
    - home_xga_l10
    - away_xga_l10
    - home_games_last_7d
    - away_games_last_7d
    - home_starter_gaa
    - away_starter_gaa
    - home_backup_save_pctg
    - away_backup_save_pctg
    - gw_home_win_prob

  player_props:
    - player_gpg
    - player_toi
    - player_shot_pct
    - opponent_ga_per_game
    - is_home
